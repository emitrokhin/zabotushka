# Test configuration
quarkus:
  test:
    profile: test
  datasource:
    db-kind: h2
    jdbc:
      url: jdbc:h2:mem:test
  hibernate-orm:
    database:
      generation: drop-and-create
  flyway:
    migrate-at-start: false

# Disable Greenway init in tests
greenway:
  init:
    enabled: false

# Test credentials
app:
  host: http://localhost:8081
  telegram:
    bot-token: test-token
    webhook:
      secret: test-secret
      enabled: false
  greenway:
    id: test-id
    password: test-password
