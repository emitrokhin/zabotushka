# Test configuration
quarkus:
  test:
    profile: test
  datasource:
    db-kind: h2
    jdbc:
      url: jdbc:h2:mem:test
  hibernate-orm:
    database:
      generation: drop-and-create
  flyway:
    migrate-at-start: false
  rest-client:
    access-bot-api:
      url: https://api.telegram.org/bot-test-access-token
    message-bot-api:
      url: https://api.telegram.org/bot-test-message-token
    "ru.mitrohinayulya.zabotushka.client.MyGreenwayLoginApi":
      url: https://greenwaystart.com
      follow-redirects: true
    vk-bot-api:
      url: https://api.vk.com/method
    my-greenway-api:
      url: https://pyapi.greenwaystart.com/pyapi/v1
      headers:
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
        Accept: application/json, text/plain, */*
        sec-ch-ua: '" Not A;Brand";v="99", "Chromium";v="99", "Google Chrome";v="99"'
        sec-ch-ua-mobile: '?0'
        sec-ch-ua-platform: '"Windows"'
        Origin: https://greenwaystart.com
        Referer: https://greenwaystart.com/
        Content-Language: ru-RU
    "ru.mitrohinayulya.zabotushka.client.MyGreenwayApi":
      url: https://pyapi.greenwaystart.com/pyapi/v1
      headers:
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
        Accept: application/json, text/plain, */*
        sec-ch-ua: '" Not A;Brand";v="99", "Chromium";v="99", "Google Chrome";v="99"'
        sec-ch-ua-mobile: '?0'
        sec-ch-ua-platform: '"Windows"'
        Origin: https://greenwaystart.com
        Referer: https://greenwaystart.com/
        Content-Language: ru-RU

# Disable Greenway init in tests
greenway:
  init:
    enabled: false

# Test credentials
app:
  host: http://localhost:8081
  telegram:
    access-bot-token: test-access-token
    message-bot-token: test-message-token
    webhook:
      secret: test-secret
      enabled: false
  max:
    bot-token: test-max-token
    webhook:
      secret: test-max-secret
      enabled: false
  vk:
    group-id: 12345
    bot-token: test-vk-token
    webhook:
      secret: test-vk-secret
      enabled: false
  greenway:
    id: test-id
    password: test-password
