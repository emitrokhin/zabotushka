quarkus:
  rate-limiter:
    buckets:
      telegram:
        limits:
          - permitted-uses: ${TELEGRAM_RATE_LIMIT:25}
            period: 1S
  log:
    file:
      path: logs/zabotushka.log
      rotation:
        max-file-size: 10M
        max-backup-index: 7
        file-suffix: .yyyy-MM-dd
  http:
    auth:
      basic: true
  otel:
    logs:
      enabled: false
    traces:
      enabled: false
    metrics:
      enabled: false
  datasource:
    db-kind: postgresql
    username: ${PG_LOGIN}
    password: ${PG_PASSWORD}
    jdbc:
      url: jdbc:postgresql://${PG_HOST}:5432/${PG_DB_NAME}
  flyway:
    migrate-at-start: true
    baseline-on-migrate: true
    baseline-version: 0
  rest-client:
    logging:
      scope: request-response
      body-limit: 2000
    access-bot-api:
      url: https://api.telegram.org/bot${app.telegram.access-bot-token}
    message-bot-api:
      url: https://api.telegram.org/bot${app.telegram.message-bot-token}
    "ru.mitrohinayulya.zabotushka.client.MyGreenwayLoginApi":
      url: https://greenwaystart.com
      follow-redirects: true
    "ru.mitrohinayulya.zabotushka.client.MyGreenwayApi":
      url: https://pyapi.greenwaystart.com/pyapi/v1

app:
  host: ${HOST}
  telegram:
    access-bot-token: ${TELEGRAM_ACCESS_BOT_TOKEN}
    message-bot-token: ${TELEGRAM_MESSAGE_BOT_TOKEN}
    webhook:
      path: /telegram/webhook
      secret: ${TELEGRAM_ACCESS_BOT_WEBHOOK_SECRET}
      enabled: ${TELEGRAM_ACCESS_BOT_WEBHOOK_ENABLED:true}
  greenway:
    id: ${GREENWAY_ID:}
    password: ${GREENWAY_PASSWORD:}
  basic-auth:
    username: ${BASIC_AUTH_USERNAME:admin}
    password: ${BASIC_AUTH_PASSWORD:admin}

"%prod":
  quarkus:
    otel:
      logs:
        enabled: true
        level: WARN
      exporter:
        otlp:
          protocol: http/protobuf
          logs:
            endpoint: ${OTLP_URL}
            headers: "Authorization=Basic ${OTLP_TOKEN}"
      resource:
        attributes: "service.name=zabotushka,deployment.environment=prod"
  rest-client:
    access-bot-api:
      url: "https://api.telegram.org/bot${app.telegram.access-bot-token}"
    message-bot-api:
      url: "https://api.telegram.org/bot${app.telegram.message-bot-token}"
